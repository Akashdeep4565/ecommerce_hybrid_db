version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hybrid_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce_hybrid
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount the schema file to auto-initialize the database
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  mongodb:
    image: mongo:6.0
    container_name: hybrid_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: ecommerce_hybrid
    ports:
      - "27018:27017"
    volumes:
      - mongodata:/data/db

volumes:
  pgdata:
  mongodata:
